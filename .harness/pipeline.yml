# Harness CI/CD Pipeline Reference
#
# This is the target pipeline spec for when this project moves to Harness.
# It mirrors the GitHub Actions workflow but uses Harness-native constructs:
#   - Approval gates between environments
#   - ServiceNow change management integration (Harness has a native SN provider)
#   - Artifact promotion across stages
#
# NOT ACTIVE — reference only. The GitHub Actions workflow is the current CI.

pipeline:
  name: ServiceNow App Pipeline
  identifier: servicenow_app_pipeline
  projectIdentifier: servicenow_coder
  orgIdentifier: default
  tags: {}

  properties:
    ci:
      codebase:
        connectorRef: account.github
        repoName: ServiceNow_Coder
        build: <+input>

  stages:
    # ─── Stage 1: Build & Validate ─────────────────────────────────
    - stage:
        name: Build
        identifier: build
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect  # or Cloud
            spec:
              connectorRef: <+input>
              namespace: harness-builds
          execution:
            steps:
              - step:
                  name: Install
                  identifier: install
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      npm install -g pnpm@latest @servicenow/sdk@latest
                      pnpm install --frozen-lockfile
                      pnpm install --frozen-lockfile --filter './apps/*'

              - step:
                  name: Validate
                  identifier: validate
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      pnpm run check
                      pnpm run lint -- --max-warnings 0

              - step:
                  name: Build Apps
                  identifier: build_apps
                  type: Run
                  spec:
                    shell: Bash
                    command: pnpm run build:apps

              - step:
                  name: Pack Artifacts
                  identifier: pack
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      for dir in apps/*/; do
                        if [ -f "$dir/now.config.json" ]; then
                          npx @servicenow/sdk pack --source "$dir"
                        fi
                      done

              # Upload packed artifacts to Harness artifact store
              # - step:
              #     name: Upload Artifacts
              #     identifier: upload
              #     type: ArtifactUpload
              #     spec: ...

    # ─── Stage 2: Deploy to Dev ────────────────────────────────────
    - stage:
        name: Deploy Dev
        identifier: deploy_dev
        type: Deployment
        spec:
          deploymentType: Custom
          environment:
            environmentRef: dev
            infrastructureDefinitions:
              - identifier: servicenow_dev
          execution:
            steps:
              - step:
                  name: Deploy Apps
                  identifier: deploy
                  type: Run
                  spec:
                    shell: Bash
                    command: node scripts/deploy.js --auth dev
                    envVariables:
                      SN_INSTANCE: <+secrets.getValue("sn_dev_instance")>
                      SN_USER: <+secrets.getValue("sn_dev_user")>
                      SN_PASSWORD: <+secrets.getValue("sn_dev_password")>

    # ─── Stage 3: Deploy to Test (future) ──────────────────────────
